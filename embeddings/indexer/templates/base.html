<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CodeRAG{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    pre.snippet {
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      border-radius: 6px;
      padding: 12px;
      max-height: 480px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .node-id { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; word-break: break-all; }
    .kind-badge { text-transform: lowercase; }
  </style>
</head>
<body>
{% block body %}{% endblock %}

<button id="cg-refresh-graph"
        class="btn btn-light shadow rounded-circle d-flex align-items-center justify-content-center"
        style="position:fixed; bottom:1rem; left:1rem; width:3rem; height:3rem; z-index:1080;"
        title="Reload graph.jsonl into Neo4j">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
       fill="none" stroke="#0d6efd" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="6" cy="6" r="2.2"/>
    <circle cx="18" cy="6" r="2.2"/>
    <circle cx="12" cy="18" r="2.2"/>
    <line x1="7.6" y1="7.4" x2="11" y2="16"/>
    <line x1="16.4" y1="7.4" x2="13" y2="16"/>
    <line x1="8" y1="6" x2="16" y2="6"/>
  </svg>
</button>

<div class="toast-container position-fixed bottom-0 start-0 p-3" style="z-index:1090;">
  <div id="cg-toast" class="toast" role="alert" aria-live="polite" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="cg-toast-body">…</div>
      <button type="button" class="btn-close me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
(function () {
  const btn = document.getElementById("cg-refresh-graph");
  const toastEl = document.getElementById("cg-toast");
  const toastBody = document.getElementById("cg-toast-body");
  if (!btn) return;

  function showToast(msg, ok) {
    toastEl.classList.remove("text-bg-success", "text-bg-danger");
    toastEl.classList.add(ok ? "text-bg-success" : "text-bg-danger");
    toastBody.textContent = msg;
    bootstrap.Toast.getOrCreateInstance(toastEl, { delay: 4000 }).show();
  }

  btn.addEventListener("click", async () => {
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-border spinner-border-sm text-primary"></span>';
    try {
      const r = await fetch("/graph/refresh", { method: "POST" });
      const data = await r.json();
      if (!r.ok || data.error) {
        showToast("Refresh failed: " + (data.error || r.statusText), false);
      } else {
        showToast(`Reloaded — ${data.nodes} nodes, ${data.edges} edges (${data.duration_s}s)`, true);
      }
    } catch (e) {
      showToast("Refresh failed: " + e.message, false);
    } finally {
      btn.disabled = false;
      btn.innerHTML = original;
    }
  });
})();
</script>
</body>
</html>
